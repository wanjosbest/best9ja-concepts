<section id="services">
    <div class="container">
        <h2 class="reveal">Our Services</h2>

        <div class="grid grid-3">

            {% for service in services %}
            <article class="card work-card service-card reveal">

                {% if service.image %}
                <div class="work-img">
                    <img src="{{ service.image.url }}" loading="lazy" alt="{{ service.title }}">
                </div>
                {% endif %}

                <!-- Icon Badge -->
                <div class="service-badge">
                    ⚡
                </div>

                <h3>{{ service.title }}</h3>

                <p class="lead">
                    {{ service.description|truncatewords:18 }}
                </p>

                <a href="{{ service.get_absolute_url }}" class="btn ghost">
                    Learn More →
                </a>

            </article>
            {% endfor %}

        </div>
    </div>
</section>
