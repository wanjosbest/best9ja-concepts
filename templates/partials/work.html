<section id="work">
    <div class="container">
        <h2 class="reveal">Selected Work</h2>

        <div class="grid grid-3">

            {% for project in projects %}
            <article class="card work-card project-card reveal">

                {% if project.image %}
                <div class="work-img">
                    <img src="{{ project.image.url }}" loading="lazy" alt="{{ project.title }}">
                </div>
                {% endif %}

                <!-- Project Badge -->
                <div class="project-badge">
                    Case Study
                </div>

                <h3>{{ project.title }}</h3>

                <p class="lead">
                    {{ project.short_description|truncatewords:18 }}
                </p>

                <a href="{{ project.get_absolute_url }}" class="btn ghost">
                    View Project →
                </a>

            </article>
            {% empty %}
            <p>No projects available yet.</p>
            {% endfor %}

        </div>

        <!-- Bottom CTA -->
        <div style="text-align:center; margin-top:3rem;">
            <a href="{% url 'work' %}" class="btn">
                View All Projects →
            </a>
        </div>

    </div>
</section>
