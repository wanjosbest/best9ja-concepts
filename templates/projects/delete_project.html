{% extends "base.html" %}
{% block title %}Delete {{ project.title }}{% endblock %}

{% block content %}

<section class="hero">
  <div class="container wrap">
    <h1>Delete <span class="grad">{{ project.title }}</span>?</h1>
    <p>This action cannot be undone.</p>
  </div>
  <div class="orb"></div>
</section>

<section class="section">
<div class="container">

<div class="card" style="max-width:600px;margin:auto;text-align:center;">

<form method="POST">
{% csrf_token %}

<p style="margin-bottom:2rem;">
Are you sure you want to permanently delete this project?
</p>

<div style="display:flex; justify-content:center; gap:1rem;">
<button class="btn" style="background:#b91c1c;">
Yes, Delete
</button>

<a href="{{ project.get_absolute_url }}" class="btn ghost">
Cancel
</a>
</div>

</form>

</div>
</div>
</section>

{% endblock %}
